name: Shellcheck

on:
  pull_request:
    branches:
      - main

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          shellcheck --external-sources --shell=bash -e SC1091 -e SC2087 pixel $(find lib -name "*.sh")
